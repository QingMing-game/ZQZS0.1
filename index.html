.notice-box button {

  border: none;
  border-radius: 14px;
}

/* ===== 长图优化版弹窗 ===== */

  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 10000;
  overflow-y: auto;
  padding: 40px 0;
}

.promo-content {
  position: relative;
  width: 95%;
  max-width: 500px;
  margin: 0 auto;
}

.promo-content img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 14px;
}

.promo-close {
  position: fixed;
  top: 20px;
  right: 20px;
  width: 42px;
  height: 42px;

  text-align: center;

#toast {

<script>
function closeNotice() {
  document.getElementById("notice").style.display = "none";
}

function openPromo() {
  document.getElementById("promoModal").style.display = "block";
  document.body.style.overflow = "hidden";
}

function closePromo() {
  document.getElementById("promoModal").style.display = "none";
  document.body.style.overflow = "auto";
}

function isWeChat() {
  return /MicroMessenger/i.test(navigator.userAgent);
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2200);
}

function copyText(text) {
  navigator.clipboard.writeText(text);
}

function openQQGroup(e) {
  var groupCode = "1037767622";
  if (isWeChat()) {
    e.preventDefault();
    showToast("请使用浏览器打开，群号已复制");
    copyText(groupCode);
    return false;
  }
  return true;
}
</script>
